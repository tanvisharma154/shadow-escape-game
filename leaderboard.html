<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Shadow Escape</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="glass-panel leaderboard-container">
        <h2>Hall of Shadows</h2>
        <p style="margin-bottom: 20px;">Top 10 Survivors</p>

        <div id="loadingIndicator" class="loading">Fetching scores...</div>
        <p id="errorMsg" style="color: var(--danger); display: none;"></p>

        <ul id="leaderboard" style="display: none;"></ul>

        <a href="index.html">
            <button style="margin-top: 20px;">Return to Game</button>
        </a>
    </div>

    <script type="module">
        import { db } from "./firebase.js";
        import { collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        async function loadLeaderboard() {
            const list = document.getElementById("leaderboard");
            const loading = document.getElementById("loadingIndicator");
            const errorMsg = document.getElementById("errorMsg");

            try {
                const q = query(
                    collection(db, "scores"),
                    orderBy("score", "desc"),
                    limit(10)
                );

                const snapshot = await getDocs(q);

                loading.style.display = "none";
                list.style.display = "block";

                if (snapshot.empty) {
                    list.innerHTML = "<p style='text-align:center; color: var(--text-muted);'>No scores yet. Be the first to survive!</p>";
                    return;
                }

                let rank = 1;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const li = document.createElement("li");

                    let rankText = "#" + rank;
                    if (rank === 1) rankText = "🥇";
                    if (rank === 2) rankText = "🥈";
                    if (rank === 3) rankText = "🥉";

                    li.innerHTML = `
        <span class="rank">${rankText}</span>
        <span class="email" title="${data.email}">${data.email.split('@')[0]}</span>
        <span class="score-val">${data.score}</span>
      `;

                    list.appendChild(li);
                    rank++;
                });

            } catch (err) {
                loading.style.display = "none";
                errorMsg.innerText = "Error loading leaderboard. " + err.message;
                errorMsg.style.display = "block";
                console.error(err);
            }
        }

        loadLeaderboard();
    </script>

</body>

</html>
