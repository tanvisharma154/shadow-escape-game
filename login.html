<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Shadow Escape</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glass-panel">
  <h2>Welcome Back</h2>
  <p style="margin-bottom: 25px;">Log in to continue your escape.</p>
  
  <div class="input-group">
    <input type="email" id="email" placeholder="Email Address" required>
  </div>
  <div class="input-group">
    <input type="password" id="password" placeholder="Password" required>
  </div>
  
  <button id="loginBtn" onclick="login()">Enter the Shadows</button>
  
  <p id="errorMsg" style="color: var(--danger); margin-top: 15px; display: none;"></p>

  <p style="margin-top: 25px;">
    New here? <a href="signup.html">Create an account</a>
  </p>
</div>

<script type="module">
import { auth } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorMsg = document.getElementById("errorMsg");
  const btn = document.getElementById("loginBtn");
  
  if(!email || !password) {
    errorMsg.innerText = "Please fill in all fields.";
    errorMsg.style.display = "block";
    return;
  }
  
  btn.innerText = "Authenticating...";
  btn.disabled = true;

  signInWithEmailAndPassword(auth, email, password)
  .then(() => {
    window.location.href = "index.html";
  })
  .catch(err => {
    errorMsg.innerText = err.message;
    errorMsg.style.display = "block";
    btn.innerText = "Enter the Shadows";
    btn.disabled = false;
  });
}
</script>

</body>
</html>
