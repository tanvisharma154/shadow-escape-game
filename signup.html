<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Shadow Escape</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="glass-panel">
        <h2>Join the Escape</h2>
        <p style="margin-bottom: 25px;">Create an account to save your scores.</p>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password (min 6 chars)" required>
        </div>

        <button id="signupBtn" onclick="signup()">Create Account</button>

        <p id="errorMsg" style="color: var(--danger); margin-top: 15px; display: none;"></p>

        <p style="margin-top: 25px;">
            Already have an account? <a href="login.html">Log in here</a>
        </p>
    </div>

    <script type="module">
        import { auth } from "./firebase.js";
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        window.signup = function () {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");
            const btn = document.getElementById("signupBtn");

            if (!email || !password) {
                errorMsg.innerText = "Please fill in all fields.";
                errorMsg.style.display = "block";
                return;
            }

            btn.innerText = "Creating Account...";
            btn.disabled = true;

            createUserWithEmailAndPassword(auth, email, password)
                .then(() => {
                    // Firebase auto-logs in on signup, redirect to index
                    window.location.href = "index.html";
                })
                .catch(err => {
                    errorMsg.innerText = err.message;
                    errorMsg.style.display = "block";
                    btn.innerText = "Create Account";
                    btn.disabled = false;
                });
        }
    </script>

</body>

</html>
